name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'CalVer version (YY.M.D, e.g. 26.7.3)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          check-latest: true
      - name: Build keygen binaries
        run: |
          mkdir -p dist
          for arch in amd64 arm64; do
            GOOS=linux GOARCH=$arch go build -trimpath \
              -ldflags "-s -w" \
              -o "dist/veil-keygen-linux-$arch" ./cmd/veil-keygen
          done
          (cd dist && sha256sum * > SHA256SUMS)
      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ inputs.version }}
        run: |
          gh release create "v$VERSION" dist/* \
            --title "VEIL core $VERSION" \
            --notes "Manual VEIL core release $VERSION."
